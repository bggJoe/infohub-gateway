name: Build and Deploy to Cloud Run

on:
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: read
  id-token: write

env:
  SERVICE_DIR: apps/gateway
  IMAGE_NAME: infohub-gateway

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ vars.GCP_DEPLOY_SERVICE_ACCOUNT }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: |
          gcloud auth configure-docker ${{ vars.GCP_REGION }}-docker.pkg.dev --quiet

      - name: Set image URI
        id: image
        run: |
          echo "uri=${{ vars.GCP_REGION }}-docker.pkg.dev/${{ vars.GCP_PROJECT_ID }}/${{ vars.GCP_ARTIFACT_REPO }}/${{ env.IMAGE_NAME }}:${GITHUB_SHA}" >> "$GITHUB_OUTPUT"

      - name: Install dependencies
        working-directory: ${{ env.SERVICE_DIR }}
        run: npm ci

      - name: Run tests
        working-directory: ${{ env.SERVICE_DIR }}
        run: npm test

      - name: Build application
        working-directory: ${{ env.SERVICE_DIR }}
        run: npm run build

      - name: Audit dependencies
        working-directory: ${{ env.SERVICE_DIR }}
        run: npm audit --audit-level=moderate

      - name: Build Docker image
        working-directory: ${{ env.SERVICE_DIR }}
        run: |
          docker build -t "${{ steps.image.outputs.uri }}" .

      - name: Push Docker image
        run: |
          docker push "${{ steps.image.outputs.uri }}"

      - name: Deploy to Cloud Run
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: ${{ vars.CLOUD_RUN_SERVICE }}
          region: ${{ vars.GCP_REGION }}
          image: ${{ steps.image.outputs.uri }}
          service_account: ${{ vars.GCP_RUNTIME_SERVICE_ACCOUNT }}
          flags: >-
            --no-allow-unauthenticated
          env_vars: |
            AUTH_MODE=iap
            IAP_AUDIENCE=${{ secrets.IAP_AUDIENCE }}
            ALLOWED_USERS=${{ vars.ALLOWED_USERS }}
            N8N_TIMEOUT_MS=${{ vars.N8N_TIMEOUT_MS }}
            N8N_MAX_RETRIES=${{ vars.N8N_MAX_RETRIES }}
            LOG_LEVEL=info
          secrets: |
            N8N_ACTION_ITEMS_URL=N8N_ACTION_ITEMS_URL:latest
            N8N_API_AUTH_HEADER_NAME=N8N_API_AUTH_HEADER_NAME:latest
            N8N_API_AUTH_HEADER_VALUE=N8N_API_AUTH_HEADER_VALUE:latest

      - name: Show deployed service URL
        run: |
          gcloud run services describe "${{ vars.CLOUD_RUN_SERVICE }}" \
            --project="${{ vars.GCP_PROJECT_ID }}" \
            --region="${{ vars.GCP_REGION }}" \
            --format='value(status.url)'
